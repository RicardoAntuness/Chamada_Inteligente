<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chamada Inteligente</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  
  <style>
    /* ============================================================
       Design System — Chamada Inteligente
       Paleta: dark navy + ciano + verde/vermelho semânticos
       Fonte: Inter & JetBrains Mono (Google Fonts)
       ============================================================ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg-base:        #0F172A;
      --bg-surface:     #1E293B;
      --bg-elevated:    #263348;
      --bg-input:       #162032;

      --accent:         #38BDF8;
      --accent-dim:     rgba(56, 189, 248, 0.15);
      --accent-glow:    rgba(56, 189, 248, 0.35);

      --green:          #10B981;
      --green-dim:      rgba(16, 185, 129, 0.15);
      --red:            #EF4444;
      --red-dim:        rgba(239, 68, 68, 0.15);
      --yellow:         #F59E0B;
      --yellow-dim:     rgba(245, 158, 11, 0.15);
      --orange:         #D35400;

      --text-primary:   #F8FAFC;
      --text-secondary: #94A3B8;
      --text-muted:     #475569;
      --text-tag:       #7DD3FC;

      --border:         rgba(148, 163, 184, 0.12);
      --border-focus:   rgba(56, 189, 248, 0.5);

      --radius-sm:      6px;
      --radius:         10px;
      --radius-lg:      16px;
      --radius-pill:    999px;

      --shadow-sm:      0 1px 3px rgba(0,0,0,0.4);
      --shadow:         0 4px 16px rgba(0,0,0,0.5);
      --shadow-glow:    0 0 20px rgba(56, 189, 248, 0.2);

      --transition:     0.18s ease;
      --font-ui:        'Inter', system-ui, sans-serif;
      --font-mono:      'JetBrains Mono', 'Fira Code', monospace;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-ui);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; }
    input, select, textarea { font-family: inherit; }

    /* ── Layout ─────────────────────────────────────────────── */
    #app { min-height: 100vh; display: flex; flex-direction: column; }

    .page {
      display: none;
      flex: 1;
      flex-direction: column;
      animation: fadeIn 0.22s ease;
    }
    .page.active { display: flex; }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(6px); } 
      to { opacity: 1; transform: none; } 
    }

    /* ── Topbar (Alinhamento Corrigido) ────────────────────── */
    .topbar {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      height: 65px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .topbar-logo {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: -0.01em;
    }
    .topbar-logo .dot {
      width: 9px; 
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }
    .topbar-spacer { flex: 1; }
    .topbar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .topbar-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .topbar-badge.professor { background: var(--accent-dim); color: var(--accent); }
    .topbar-badge.aluno     { background: var(--green-dim);  color: var(--green);  }

    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
      transition: var(--transition);
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

    /* ── Main content wrapper ───────────────────────────────── */
    .main-content {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cards / Surfaces ───────────────────────────────────── */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 500;
      transition: var(--transition);
      white-space: nowrap;
      justify-content: center;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: var(--bg-base); font-weight: 600; }
    .btn-primary:not(:disabled):hover { background: #7DD3FC; box-shadow: 0 0 14px var(--accent-glow); }
    
    .btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-full { width: 100%; }

    /* ── Form Elements ──────────────────────────────────────── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); }
    .form-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 0.875rem;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-dim); }
    .form-error { font-size: 0.75rem; color: var(--red); margin-top: 2px; }

    /* ── Login View ─────────────────────────────────────────── */
    .login-wrap {
      min-height: calc(100vh - 65px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 40%, rgba(56,189,248,0.04) 0%, transparent 70%), var(--bg-base);
    }
    .login-box { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 24px; }
    .login-header { text-align: center; }
    .login-logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text-primary); margin-bottom: 4px; }
    .login-logo span { color: var(--accent); }
    .login-sub { font-size: 0.875rem; color: var(--text-secondary); }

    /* ── Empty State ────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
    .empty-state-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.6; animation: rotate 2s linear infinite; }
    .empty-state-msg  { font-size: 0.875rem; color: var(--text-secondary); }

    /* ── Animations & Pulses ────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 var(--accent-glow); }
      50%      { opacity: 0.8; transform: scale(1.05); box-shadow: 0 0 0 6px rgba(56,189,248,0); }
    }
    @keyframes rotate { to { transform: rotate(365deg); } }

    /* ── Custom Scrollbar ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
<div id="app">

  <header class="topbar" id="topbar" style="display:none;">
    <div class="topbar-logo">
      <span class="dot"></span>
      Chamada Inteligente
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-user">
      <span id="topbar-name"></span>
      <span class="topbar-badge" id="topbar-badge"></span>
    </div>
    <button class="btn-logout" id="btn-logout">Sair</button>
  </header>

  <div class="page active" id="page-login">
    <div class="login-wrap">
      <div class="login-box">

        <div class="login-header">
          <div class="login-logo">📡 Chamada<span>.</span></div>
          <div class="login-sub">Sistema inteligente de presença via RFID</div>
        </div>

        <div class="card">
          <form id="login-form" novalidate style="display:flex;flex-direction:column;gap:16px;">
            <div class="form-group">
              <label class="form-label" for="login-email">E-mail</label>
              <input
                type="email"
                id="login-email"
                class="form-input"
                placeholder="seu@escola.edu.br"
                autocomplete="email"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label" for="login-password">Senha</label>
              <input
                type="password"
                id="login-password"
                class="form-input"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
            </div>
            <span class="form-error" id="login-error" style="display:none;"></span>
            <button type="submit" class="btn btn-primary btn-full" id="btn-login">
              Entrar
            </button>
          </form>
        </div>

        <div style="display:flex;flex-direction:column;gap:8px;">
          <p style="font-size:.72rem;text-align:center;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;">
            Acesso rápido (demo)
          </p>
          <div style="display:flex;gap:8px;">
            <button
              class="btn btn-secondary btn-sm"
              style="flex:1;"
              data-demo-login="carlos@escola.edu.br:prof123"
            >
              👨‍🏫 Professor
            </button>
            <button
              class="btn btn-secondary btn-sm"
              style="flex:1;"
              data-demo-login="ana@escola.edu.br:aluno123"
            >
              🎓 Aluno
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="page" id="page-professor">
    <div class="main-content">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-msg">Carregando dashboard…</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-aluno">
    </div>

</div><div id="toast-container"></div>

<script type="module" src="app.js"></script>
</body>
</html>
