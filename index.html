<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor - Validação</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #2c3e50; --secondary: #18bc9c; --danger: #e74c3c; --text: #333; --card-bg: #fff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1, h2 { color: var(--primary); }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .full-width { grid-column: 1 / -1; }
        button { background: var(--secondary); color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        input { padding: 10px; width: calc(100% - 22px); margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .flex-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        .badge-presente { background: var(--secondary); color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; }
        .badge-atrasado { background: #f39c12; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; }
        .status-box { padding: 10px; background: #eee; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Painel do Professor - Validação de Hardware</h1>

    <div class="container">
        <div class="card">
            <h2>1. Controle da Aula</h2>
            <button onclick="iniciarAula()">⏱ Iniciar Aula</button>
            <p id="aula-status" class="status-box">Aula não iniciada.</p>
        </div>

        <div class="card">
            <h2>2. Cadastro de Alunos</h2>
            <div class="flex-row">
                <button onclick="modoCadastro()">📡 Avisar Arduino</button>
                <button onclick="consultarTag()">🔄 Puxar Tag</button>
            </div>
            <input type="text" id="uid-input" placeholder="A UID da tag aparecerá aqui..." readonly>
            <input type="text" id="nome-input" placeholder="Digite o nome do aluno">
            <button onclick="salvarAluno()">💾 Salvar no Banco</button>
        </div>

        <div class="card full-width">
            <h2>Alunos Cadastrados <button onclick="carregarAlunos()" style="float: right;">Atualizar</button></h2>
            <table>
                <thead><tr><th>ID</th><th>UID</th><th>Nome</th></tr></thead>
                <tbody id="tabela-alunos"><tr><td colspan="3">Carregando...</td></tr></tbody>
            </table>
        </div>

        <div class="card full-width">
            <h2>Leituras no Sensor <button onclick="carregarPresencas()" style="float: right;">Atualizar</button></h2>
            <table>
                <thead><tr><th>ID Reg.</th><th>UID</th><th>Status</th><th>Faltas</th></tr></thead>
                <tbody id="tabela-presencas"><tr><td colspan="4">Carregando...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        // Use o IP da Raspberry ou deixe vazio para usar o mesmo host do servidor
        const API_URL = "http://192.168.3.51:3000";

        async function iniciarAula() {
            const res = await fetch(`${API_URL}/aula/iniciar`, { method: 'POST' });
            const data = await res.json();
            document.getElementById('aula-status').innerText = `✅ ${data.mensagem}`;
        }

        async function modoCadastro() { await fetch(`${API_URL}/cadastro/iniciar`, { method: 'POST' }); alert("Pronto para ler tag!"); }

        async function consultarTag() {
            const res = await fetch(`${API_URL}/cadastro/status`);
            const data = await res.json();
            if (data.uid) document.getElementById('uid-input').value = data.uid;
            else alert("Nenhuma tag lida.");
        }

        async function salvarAluno() {
            const uid = document.getElementById('uid-input').value;
            const nome = document.getElementById('nome-input').value;
            await fetch(`${API_URL}/cadastro/salvar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid, nome })
            });
            alert("Salvo!");
            carregarAlunos();
        }

        async function carregarAlunos() {
            const res = await fetch(`${API_URL}/alunos`);
            const alunos = await res.json();
            const tbody = document.getElementById('tabela-alunos');
            tbody.innerHTML = alunos.map(a => `<tr><td>${a.id}</td><td>${a.uid}</td><td>${a.nome}</td></tr>`).join('');
        }

        async function carregarPresencas() {
            const res = await fetch(`${API_URL}/presencas?t=${Date.now()}`);
            const presencas = await res.json();
            const tbody = document.getElementById('tabela-presencas');
            tbody.innerHTML = presencas.map(p => `
                <tr><td>${p.id}</td><td>${p.uid}</td>
                <td><span class="${p.status === 'PRESENTE' ? 'badge-presente' : 'badge-atrasado'}">${p.status}</span></td>
                <td>${p.faltas} bloco(s)</td></tr>`).join('');
        }

        // Auto-carregamento ao abrir
        window.onload = () => {
            carregarAlunos();
            carregarPresencas();
            setInterval(carregarPresencas, 3000);
        };
    </script>
</body>
</html>
